##### ~/.tmux.conf #####

##### PREFIX #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### QUALITY OF LIFE #####
set -sg escape-time 10
setw -g mode-keys vi
set -g history-limit 200000

# Mouse support (scrolling, pane resize, pane/window select)
set -g mouse on

# Indexing from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### UNBIND DEFAULTS THAT CONFLICT #####
unbind '"'
unbind %
unbind o

##### PANES: CREATE (easy keys) #####
unbind v
unbind s
bind v split-window -h -c "#{pane_current_path}"   # Ctrl-a v (left/right)
bind s split-window -v -c "#{pane_current_path}"   # Ctrl-a s (top/bottom)

##### PANES: NAVIGATE #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Tab last-pane                                  # toggle last pane
# bind o select-pane -t :. +                          # next pane

##### PANES: RESIZE (repeatable) #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### PANES: ZOOM #####
bind z resize-pane -Z

##### WINDOWS: CREATE / CLOSE #####
bind c new-window -c "#{pane_current_path}"         # Ctrl-a c
bind x kill-window                                  # Ctrl-a x

##### WINDOWS: NAVIGATE #####
bind n next-window
bind p previous-window
bind b last-window                                  # toggle last window
bind w choose-tree -Zw                              # picker

##### WINDOWS: JUMP BY NUMBER #####
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

##### SESSIONS #####
bind d detach
bind S choose-tree -Zs

##### RELOAD CONFIG #####
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

unbind t
bind t display-popup -E -w 90% -h 90% "btop"

##### SPOTIFY #####
# Spotify Player popup
bind m run-shell '
if [ "#{session_name}" = "spotify" ]; then
  tmux display-message "Already in spotify session - use prefix d to detach"
else
  tmux has-session -t spotify 2>/dev/null || tmux new-session -d -s spotify "/bin/zsh -lc spotify_player"
  tmux display-popup -E "/bin/zsh -lc '\''tmux attach -t spotify'\''"
fi
'

###########
### TPM ###
###########

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-net-speed'

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load Catppuccin manually
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

##################
### STATUS BAR ###
##################
set -g status on
set -g status-position top
set -g status-interval 3
set -g status-left-length 80
set -g status-right-length 220
set -g status-justify left
set -g status-style "bg=default,fg=#6c7086"

# Left: none
set -g status-left ''

# Window list
setw -g window-status-format         '#[fg=#6c7086] #I.#P:#W '
setw -g window-status-current-format '#[fg=#cba6f7,bold] #I.#P:#W '
setw -g window-status-separator      '#[fg=#313244,nobold]'

# Right: CPU | RAM | net | GPU | VRAM  — LINUX
set -g  status-right '#[fg=#89b4fa]cpu #[fg=#a6adc8]#{cpu_percentage}#[fg=#45475a] | '
set -ag status-right '#[fg=#94e2d5]ram #[fg=#a6adc8]#(free -h | awk "/^Mem:/ {print \$3\"/\"\$2}")#[fg=#45475a] | '
set -ag status-right '#[fg=#b4befe]↓ #[fg=#a6adc8]#{download_speed}#[fg=#45475a] | '
set -ag status-right '#[fg=#f5c2e7]↑ #[fg=#a6adc8]#{upload_speed}#[fg=#45475a] | '
set -ag status-right '#[fg=#fab387]gpu #[fg=#a6adc8]#{gpu_percentage}#[fg=#45475a] | '
set -ag status-right '#[fg=#f38ba8]vram #[fg=#a6adc8]#(nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null | awk -F", *" "{printf \"%.1f/%.1fG\", \$1/1024, \$2/1024}") '

# Right: CPU | RAM | net | GPU | VRAM  — MACOS (swap RAM command; rest is identical)
# set -g  status-right '#[fg=#89b4fa]cpu #[fg=#a6adc8]#{cpu_percentage}#[fg=#45475a] | '
# set -ag status-right '#[fg=#94e2d5]mem #[fg=#a6adc8]#(used=$(top -l 1 -s 0 | grep PhysMem | cut -d" " -f2); total=$(( $(sysctl -n hw.memsize) / 1024 / 1024 / 1024 ))G; printf "%s/%s" "$used" "$total")#[fg=#45475a] | '
# set -ag status-right '#[fg=#b4befe]↓ #[fg=#a6adc8]#{download_speed}#[fg=#45475a] | '
# set -ag status-right '#[fg=#f5c2e7]↑ #[fg=#a6adc8]#{upload_speed}#[fg=#45475a] | '
# set -ag status-right '#[fg=#fab387]gpu #[fg=#a6adc8]#{gpu_percentage}#[fg=#45475a] | '
# set -ag status-right '#[fg=#f38ba8]vram #[fg=#a6adc8]#(nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null | awk -F", *" "{printf \"%.1f/%.1fG\", \$1/1024, \$2/1024}") '

# Initialize TMUX plugin manager
# Keep this at the very bottom
run '~/.tmux/plugins/tpm/tpm'

